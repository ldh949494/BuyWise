services:
  backend:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    environment:
      APP_PORT: 8000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - mysql
    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store
      - ./uploads:/app/uploads

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-123456}"
      MYSQL_USER: "${MYSQL_USER:-buywise}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-buywise}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-buywise_dev}"
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
