name: AI Auto Validate README PR

on:
  workflow_dispatch:
    inputs:
      run_doc_gardening:
        description: "Generate a repository memory maintenance report"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_entropy_gc:
        description: "Generate an entropy garbage-collection report"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "auto/local-*"
    paths-ignore:
      - "README.md"

permissions:
  contents: write
  pull-requests: write
  models: read

concurrency:
  group: ai-auto-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Delegate pull request validation
        run: |
          echo "Pull request validation is handled by the PR Validation workflow."
          echo "This automation workflow only mutates repository state on workflow_dispatch or auto branch push events."

  entropy-gc:
    if: github.event_name == 'workflow_dispatch' && inputs.run_entropy_gc == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate entropy baseline
        run: python scripts/validate_entropy.py

      - name: Generate entropy GC report
        run: python scripts/entropy_gc.py

      - name: Upload entropy GC report
        uses: actions/upload-artifact@v4
        with:
          name: entropy-gc-report
          path: artifacts/entropy-gc/report.md

  doc-gardening:
    if: github.event_name == 'workflow_dispatch' && inputs.run_doc_gardening == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate repository memory docs
        run: python scripts/validate_docs.py

      - name: Install GitHub Models CLI extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install https://github.com/github/gh-models

      - name: Generate doc-gardening report
        env:
          GH_TOKEN: ${{ github.token }}
          DOC_GARDENING_MODEL: openai/gpt-4.1
        run: python scripts/doc_gardening.py

      - name: Upload doc-gardening report
        uses: actions/upload-artifact@v4
        with:
          name: doc-gardening-report
          path: artifacts/doc-gardening/report.md

  ai-automation:
    if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          $androidChanged = $false
          $adminWebChanged = $false

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $androidChanged = $true
            $adminWebChanged = $true
          } elseif ("${{ github.event_name }}" -eq "pull_request") {
            $baseSha = "${{ github.event.pull_request.base.sha }}"
            $headSha = "${{ github.event.pull_request.head.sha }}"
            $changedFiles = git diff --name-only "$baseSha..$headSha"
          } else {
            $before = "${{ github.event.before }}"
            $sha = "${{ github.sha }}"
            if (-not $before -or $before -eq ("0" * 40)) {
              $changedFiles = git diff-tree --no-commit-id --name-only -r $sha
            } else {
              $changedFiles = git diff --name-only "$before..$sha"
            }
          }

          foreach ($file in $changedFiles) {
            if (
              $file -like "android-app/*" -or
              $file -eq ".github/workflows/ai-auto-commit.yml" -or
              $file -eq "scripts/auto_validate.ps1"
            ) {
              $androidChanged = $true
            }

            if (
              $file -like "admin-web/*" -or
              $file -eq ".github/workflows/ai-auto-commit.yml" -or
              $file -eq "scripts/auto_validate.ps1"
            ) {
              $adminWebChanged = $true
            }

            if ($androidChanged -and $adminWebChanged) {
              break
            }
          }

          "android_changed=$($androidChanged.ToString().ToLowerInvariant())" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "admin_web_changed=$($adminWebChanged.ToString().ToLowerInvariant())" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Setup Java
        if: ${{ steps.changes.outputs.android_changed == 'true' && !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Node
        if: ${{ steps.changes.outputs.admin_web_changed == 'true' && !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install admin-web dependencies
        if: ${{ steps.changes.outputs.admin_web_changed == 'true' && !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        working-directory: admin-web
        run: npm ci

      - name: Run validation
        if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          $validationArgs = @("-SkipDependencyInstall")
          if ("${{ steps.changes.outputs.android_changed }}" -ne "true") {
            $validationArgs += "-SkipAndroidBuild"
          }
          if ("${{ steps.changes.outputs.admin_web_changed }}" -ne "true") {
            $validationArgs += "-SkipAdminWebBuild"
          }
          ./scripts/auto_validate.ps1 @validationArgs

      - name: Prepare Pull Request summary prompt
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/auto/local-')
        run: |
          git fetch origin main

          $changedFiles = git diff --name-status origin/main...HEAD | Out-String
          $commitSummary = git log --oneline --no-merges origin/main..HEAD | Out-String
          $diffStat = git diff --stat origin/main...HEAD | Out-String
          $diff = git diff --unified=1 --no-ext-diff origin/main...HEAD | Out-String

          $maxDiffChars = 12000
          if ($diff.Length -gt $maxDiffChars) {
            $diff = $diff.Substring(0, $maxDiffChars) + "`n[Diff truncated for model context]"
          }

          $prompt = @"
          Generate GitHub Pull Request metadata from the git changes below.
          Return only valid JSON with this exact shape:
          {"title":"...","body":"..."}

          Requirements:
          - Write title and body in Simplified Chinese.
          - The title must use conventional commit style, for example: "feat: 添加商品模型".
          - Keep the title under 80 characters.
          - The body must be Markdown and include these headings exactly: "## 概述", "## 变更内容", "## 验证结果".
          - In "## 验证结果", state that automated validation passed.
          - Do not invent changes that are not present in the commits or diff.
          - Keep the content concise and useful for code review.
          - Return raw JSON only. Do not wrap it in Markdown code fences.

          Changed files:
          $changedFiles

          Commits:
          $commitSummary

          Diff stat:
          $diffStat

          Diff excerpt:
          $diff
          "@

          $prompt | Out-File -FilePath pr-summary-prompt.md -Encoding utf8

      - name: Install GitHub Models CLI extension for Pull Request summary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/auto/local-')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install https://github.com/github/gh-models

      - name: Generate Pull Request summary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/auto/local-')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_SUMMARY_MODEL: openai/gpt-4.1
        run: |
          try {
            function Convert-ModelJson {
              param([string]$Raw)

              $text = $Raw.Trim()
              if ($text.StartsWith('```')) {
                $text = $text -replace '(?s)^```(?:json)?\s*', ''
                $text = $text -replace '(?s)\s*```$', ''
                $text = $text.Trim()
              }

              try {
                return $text | ConvertFrom-Json -ErrorAction Stop
              } catch {
                $match = [regex]::Match($text, '(?s)\{.*\}')
                if (-not $match.Success) {
                  throw
                }
                return $match.Value | ConvertFrom-Json -ErrorAction Stop
              }
            }

            $modelOutput = Get-Content pr-summary-prompt.md -Raw |
              gh models run $env:PR_SUMMARY_MODEL "Read stdin and generate Pull Request metadata. Return only JSON with title and body." --max-tokens 1200 --temperature 0
            $modelOutput | Out-File -FilePath pr-summary-raw.txt -Encoding utf8
            Write-Host "AI PR metadata response length: $($modelOutput.Length)"

            $metadata = Convert-ModelJson $modelOutput

            $title = [string]$metadata.title
            $body = [string]$metadata.body

            if ([string]::IsNullOrWhiteSpace($title) -or [string]::IsNullOrWhiteSpace($body)) {
              throw "Model response did not include a usable title and body."
            }

            $title = $title -replace "(`r`n|`n|`r)", " "
            if ($title -notmatch "\p{IsCJKUnifiedIdeographs}" -or $body -notmatch "\p{IsCJKUnifiedIdeographs}") {
              throw "Model response did not include Chinese PR metadata."
            }
            $title | Out-File -FilePath pr-title.txt -Encoding utf8 -NoNewline
            $body | Out-File -FilePath pr-body.md -Encoding utf8
            Write-Host "Saved AI-generated PR title and body."
          } catch {
            Write-Warning "Could not parse AI-generated PR metadata: $_"
          }

      - name: Create Pull Request for auto publish branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/auto/local-')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $branchName = "${{ github.ref_name }}"
          $headName = "${{ github.repository_owner }}:$branchName"
          $title = "chore: 验证并发布本地变更"
          $body = @"
          ## 概述
          本 PR 由 ai-auto-commit workflow 自动创建，用于提交已通过验证的本地变更。

          ## 变更内容
          - 发布当前自动化分支中的代码变更。

          ## 验证结果
          - 自动化验证已通过。
          "@

          if (Test-Path pr-title.txt) {
            $generatedTitle = (Get-Content pr-title.txt -Raw).Trim()
            if (-not [string]::IsNullOrWhiteSpace($generatedTitle)) {
              $title = $generatedTitle
              Write-Host "Using AI-generated PR title."
            }
          }

          if (Test-Path pr-body.md) {
            $generatedBody = (Get-Content pr-body.md -Raw).Trim()
            if (-not [string]::IsNullOrWhiteSpace($generatedBody)) {
              $body = $generatedBody
              Write-Host "Using AI-generated PR body."
            }
          }

          if (-not (Test-Path pr-body.md)) {
            Write-Warning "AI-generated PR body was not found; using fallback PR body."
            git fetch origin main
            $changedFileBullets = git diff --name-status origin/main...HEAD |
              ForEach-Object { "- $_" } |
              Out-String
            $diffStat = git diff --stat origin/main...HEAD | Out-String
            $body = @"
          ## 概述
          本 PR 由 ai-auto-commit workflow 自动创建。GitHub Models 未生成可用摘要，已回退为基于 git diff 的确定性摘要。

          ## 变更内容
          $changedFileBullets
          ## Diff 统计
          ````text
          $diffStat
          ````

          ## 验证结果
          - 自动化验证已通过。
          "@
          }

          $body | Out-File -FilePath pr-create-body.md -Encoding utf8

          $existingPr = gh pr list `
            --base main `
            --head $branchName `
            --state open `
            --json number `
            --jq ".[0].number"

          if ($existingPr) {
            Write-Host "Pull request #$existingPr already exists for '$branchName'. Updating title and body."
            gh pr edit $existingPr `
              --title $title `
              --body-file pr-create-body.md

            if ($LASTEXITCODE -ne 0) {
              Write-Warning "GitHub Actions could not update pull request #$existingPr."
            }
            exit 0
          }

          gh pr create `
            --title $title `
            --body-file pr-create-body.md `
            --base main `
            --head $headName

          if ($LASTEXITCODE -ne 0) {
            Write-Warning "GitHub Actions could not create the pull request automatically."
            Write-Host "Create it manually: https://github.com/${{ github.repository }}/compare/main...$branchName?expand=1"
            exit 0
          }

      - name: Install GitHub Models CLI extension for README update
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install https://github.com/github/gh-models

      - name: Update README by AI
        id: readme_ai
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_MODELS_README_MODEL: openai/gpt-4.1
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          $output = python scripts/ai_update_readme.py
          $output | Tee-Object -FilePath readme-ai.log
          if ($output -contains "README_CHANGED=true") {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Create branch and commit README
        id: commit_branch
        if: steps.readme_ai.outputs.changed == 'true'
        run: |
          $branchName = "ai-auto/$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          "branch_name=$branchName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git diff --quiet -- README.md
          if ($LASTEXITCODE -eq 0) {
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          git checkout -b $branchName
          git add README.md
          git commit -m "chore(ai): auto update README after validation"
          git push origin $branchName

          "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Prepare README Pull Request summary prompt
        if: steps.commit_branch.outputs.has_changes == 'true'
        run: |
          git fetch origin main

          $changedFiles = git diff --name-status origin/main...HEAD | Out-String
          $commitSummary = git log --oneline --no-merges origin/main..HEAD | Out-String
          $diffStat = git diff --stat origin/main...HEAD | Out-String
          $diff = git diff --unified=1 --no-ext-diff origin/main...HEAD | Out-String

          $maxDiffChars = 12000
          if ($diff.Length -gt $maxDiffChars) {
            $diff = $diff.Substring(0, $maxDiffChars) + "`n[Diff truncated for model context]"
          }

          $prompt = @"
          Generate GitHub Pull Request metadata for an automated README update.
          Return only valid JSON with this exact shape:
          {"title":"...","body":"..."}

          Requirements:
          - Write title and body in Simplified Chinese.
          - The title must use conventional commit style, for example: "docs: 更新项目说明文档".
          - Keep the title under 80 characters.
          - The body must be Markdown and include these headings exactly: "## 概述", "## 变更内容", "## 评审说明".
          - In "## 评审说明", state that README.md was updated by the automation workflow.
          - Do not invent changes that are not present in the commits or diff.
          - Keep the content concise and useful for code review.
          - Return raw JSON only. Do not wrap it in Markdown code fences.

          Changed files:
          $changedFiles

          Commits:
          $commitSummary

          Diff stat:
          $diffStat

          Diff excerpt:
          $diff
          "@

          $prompt | Out-File -FilePath readme-pr-summary-prompt.md -Encoding utf8

      - name: Install GitHub Models CLI extension for README Pull Request summary
        if: steps.commit_branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install https://github.com/github/gh-models

      - name: Generate README Pull Request summary
        if: steps.commit_branch.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_SUMMARY_MODEL: openai/gpt-4.1
        run: |
          try {
            function Convert-ModelJson {
              param([string]$Raw)

              $text = $Raw.Trim()
              if ($text.StartsWith('```')) {
                $text = $text -replace '(?s)^```(?:json)?\s*', ''
                $text = $text -replace '(?s)\s*```$', ''
                $text = $text.Trim()
              }

              try {
                return $text | ConvertFrom-Json -ErrorAction Stop
              } catch {
                $match = [regex]::Match($text, '(?s)\{.*\}')
                if (-not $match.Success) {
                  throw
                }
                return $match.Value | ConvertFrom-Json -ErrorAction Stop
              }
            }

            $modelOutput = Get-Content readme-pr-summary-prompt.md -Raw |
              gh models run $env:PR_SUMMARY_MODEL "Read stdin and generate README Pull Request metadata. Return only JSON with title and body." --max-tokens 1200 --temperature 0
            $modelOutput | Out-File -FilePath readme-pr-summary-raw.txt -Encoding utf8
            Write-Host "AI README PR metadata response length: $($modelOutput.Length)"

            $metadata = Convert-ModelJson $modelOutput

            $title = [string]$metadata.title
            $body = [string]$metadata.body

            if ([string]::IsNullOrWhiteSpace($title) -or [string]::IsNullOrWhiteSpace($body)) {
              throw "Model response did not include a usable title and body."
            }

            $title = $title -replace "(`r`n|`n|`r)", " "
            if ($title -notmatch "\p{IsCJKUnifiedIdeographs}" -or $body -notmatch "\p{IsCJKUnifiedIdeographs}") {
              throw "Model response did not include Chinese README PR metadata."
            }
            $title | Out-File -FilePath readme-pr-title.txt -Encoding utf8 -NoNewline
            $body | Out-File -FilePath readme-pr-body.md -Encoding utf8
            Write-Host "Saved AI-generated README PR title and body."
          } catch {
            Write-Warning "Could not parse AI-generated README PR metadata: $_"
          }

      - name: Create README Pull Request
        if: steps.commit_branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $title = "docs: 自动更新 README"
          $body = @"
          ## 概述
          本 PR 由自动化流程创建，用于提交 README.md 的更新。

          ## 变更内容
          - 更新 README.md，使文档与当前项目状态保持一致。

          ## 评审说明
          - README.md 已由自动化流程更新，请重点检查说明是否准确。
          "@

          if (Test-Path readme-pr-title.txt) {
            $generatedTitle = (Get-Content readme-pr-title.txt -Raw).Trim()
            if (-not [string]::IsNullOrWhiteSpace($generatedTitle)) {
              $title = $generatedTitle
              Write-Host "Using AI-generated README PR title."
            }
          }

          if (Test-Path readme-pr-body.md) {
            $generatedBody = (Get-Content readme-pr-body.md -Raw).Trim()
            if (-not [string]::IsNullOrWhiteSpace($generatedBody)) {
              $body = $generatedBody
              Write-Host "Using AI-generated README PR body."
            }
          }

          if (-not (Test-Path readme-pr-body.md)) {
            Write-Warning "AI-generated README PR body was not found; using fallback PR body."
            git fetch origin main
            $changedFileBullets = git diff --name-status origin/main...HEAD |
              ForEach-Object { "- $_" } |
              Out-String
            $diffStat = git diff --stat origin/main...HEAD | Out-String
            $body = @"
          ## 概述
          本 PR 由 ai-auto-commit workflow 自动创建，用于提交 README 自动更新。GitHub Models 未生成可用摘要，已回退为基于 git diff 的确定性摘要。

          ## 变更内容
          $changedFileBullets
          ## Diff 统计
          ````text
          $diffStat
          ````

          ## 评审说明
          - README.md 已由自动化 workflow 更新。
          "@
          }

          $body | Out-File -FilePath readme-pr-create-body.md -Encoding utf8

          $branchName = "${{ steps.commit_branch.outputs.branch_name }}"
          $existingPr = gh pr list `
            --base main `
            --head $branchName `
            --state open `
            --json number `
            --jq ".[0].number"

          if ($existingPr) {
            Write-Host "Pull request #$existingPr already exists for '$branchName'. Updating title and body."
            gh pr edit $existingPr `
              --title $title `
              --body-file readme-pr-create-body.md

            if ($LASTEXITCODE -ne 0) {
              Write-Warning "GitHub Actions could not update pull request #$existingPr."
            }
            exit 0
          }

          gh pr create `
            --title $title `
            --body-file readme-pr-create-body.md `
            --base main `
            --head $branchName

          if ($LASTEXITCODE -ne 0) {
            Write-Warning "GitHub Actions could not create the pull request automatically."
            Write-Host "Create it manually: https://github.com/${{ github.repository }}/compare/main...$branchName?expand=1"
            exit 0
          }
