name: AI Auto Validate README PR

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "auto/local-*"
    paths-ignore:
      - "README.md"

permissions:
  contents: write
  pull-requests: write
  models: read

concurrency:
  group: ai-auto-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-automation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          $androidChanged = $false

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $androidChanged = $true
          } elseif ("${{ github.event_name }}" -eq "pull_request") {
            $baseSha = "${{ github.event.pull_request.base.sha }}"
            $headSha = "${{ github.event.pull_request.head.sha }}"
            $changedFiles = git diff --name-only "$baseSha..$headSha"
          } else {
            $before = "${{ github.event.before }}"
            $sha = "${{ github.sha }}"
            if (-not $before -or $before -eq ("0" * 40)) {
              $changedFiles = git diff-tree --no-commit-id --name-only -r $sha
            } else {
              $changedFiles = git diff --name-only "$before..$sha"
            }
          }

          foreach ($file in $changedFiles) {
            if (
              $file -like "android-app/*" -or
              $file -eq ".github/workflows/ai-auto-commit.yml" -or
              $file -eq "scripts/auto_validate.ps1"
            ) {
              $androidChanged = $true
              break
            }
          }

          "android_changed=$($androidChanged.ToString().ToLowerInvariant())" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Setup Java
        if: ${{ steps.changes.outputs.android_changed == 'true' && !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run validation
        if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          if ("${{ steps.changes.outputs.android_changed }}" -eq "true") {
            ./scripts/auto_validate.ps1 -SkipDependencyInstall
          } else {
            ./scripts/auto_validate.ps1 -SkipDependencyInstall -SkipAndroidBuild
          }

      - name: Prepare Pull Request summary prompt
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/auto/local-')
        run: |
          git fetch origin main

          $changedFiles = git diff --name-status origin/main...HEAD | Out-String
          $commitSummary = git log --oneline --no-merges origin/main..HEAD | Out-String
          $diffStat = git diff --stat origin/main...HEAD | Out-String
          $diff = git diff --unified=2 --no-ext-diff origin/main...HEAD | Out-String

          if ($diff.Length -gt 50000) {
            $diff = $diff.Substring(0, 50000) + "`n[Diff truncated for model context]"
          }

          $prompt = @"
          Write polished GitHub pull request metadata from the provided git changes.
          Return only JSON with this exact shape:
          {"title":"...","body":"..."}

          Requirements:
          - Title must use conventional commit style and be 80 characters or fewer.
          - Body must be Markdown with these sections: Summary, Changes, Validation.
          - Mention that automated validation passed in the Validation section.
          - Do not invent changes that are not supported by the commits or diff.
          - Keep the body concise and reviewer-friendly.
          - Return raw JSON only. Do not wrap it in Markdown code fences.

          Changed files:
          $changedFiles

          Commits:
          $commitSummary

          Diff stat:
          $diffStat

          Diff excerpt:
          $diff
          "@

          $prompt | Out-File -FilePath pr-summary-prompt.md -Encoding utf8

      - name: Install GitHub Models CLI extension for Pull Request summary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/auto/local-')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install https://github.com/github/gh-models

      - name: Generate Pull Request summary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/auto/local-')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_SUMMARY_MODEL: openai/gpt-4.1
        run: |
          try {
            $prompt = Get-Content pr-summary-prompt.md -Raw
            $modelOutput = "" | gh models run $env:PR_SUMMARY_MODEL $prompt
            $modelOutput | Out-File -FilePath pr-summary-raw.txt -Encoding utf8
            Write-Host "AI PR metadata response length: $($modelOutput.Length)"

            $jsonText = [regex]::Match($modelOutput, "(?s)\{.*\}").Value
            $metadata = $jsonText | ConvertFrom-Json -ErrorAction Stop

            $title = [string]$metadata.title
            $body = [string]$metadata.body

            if ([string]::IsNullOrWhiteSpace($title) -or [string]::IsNullOrWhiteSpace($body)) {
              throw "Model response did not include a usable title and body."
            }

            $title = $title -replace "(`r`n|`n|`r)", " "
            $title | Out-File -FilePath pr-title.txt -Encoding utf8 -NoNewline
            $body | Out-File -FilePath pr-body.md -Encoding utf8
            Write-Host "Saved AI-generated PR title and body."
          } catch {
            Write-Warning "Could not parse AI-generated PR metadata: $_"
          }

      - name: Create Pull Request for auto publish branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/auto/local-')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $branchName = "${{ github.ref_name }}"
          $headName = "${{ github.repository_owner }}:$branchName"
          $title = "chore: validate and publish local changes"
          $body = "Automated validation passed. This PR was created by the ai-auto-commit workflow."

          if (Test-Path pr-title.txt) {
            $generatedTitle = (Get-Content pr-title.txt -Raw).Trim()
            if (-not [string]::IsNullOrWhiteSpace($generatedTitle)) {
              $title = $generatedTitle
              Write-Host "Using AI-generated PR title."
            }
          }

          if (Test-Path pr-body.md) {
            $generatedBody = (Get-Content pr-body.md -Raw).Trim()
            if (-not [string]::IsNullOrWhiteSpace($generatedBody)) {
              $body = $generatedBody
              Write-Host "Using AI-generated PR body."
            }
          }

          if (-not (Test-Path pr-body.md)) {
            Write-Warning "AI-generated PR body was not found; using fallback PR body."
          }

          $body | Out-File -FilePath pr-create-body.md -Encoding utf8

          $existingPr = gh pr list `
            --base main `
            --head $branchName `
            --state open `
            --json number `
            --jq ".[0].number"

          if ($existingPr) {
            Write-Host "Pull request #$existingPr already exists for '$branchName'. Updating title and body."
            gh pr edit $existingPr `
              --title $title `
              --body-file pr-create-body.md

            if ($LASTEXITCODE -ne 0) {
              Write-Warning "GitHub Actions could not update pull request #$existingPr."
            }
            exit 0
          }

          gh pr create `
            --title $title `
            --body-file pr-create-body.md `
            --base main `
            --head $headName

          if ($LASTEXITCODE -ne 0) {
            Write-Warning "GitHub Actions could not create the pull request automatically."
            Write-Host "Create it manually: https://github.com/${{ github.repository }}/compare/main...$branchName?expand=1"
            exit 0
          }

      - name: Install GitHub Models CLI extension for README update
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install https://github.com/github/gh-models

      - name: Update README by AI
        id: readme_ai
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_MODELS_README_MODEL: openai/gpt-4.1
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          $output = python scripts/ai_update_readme.py
          $output | Tee-Object -FilePath readme-ai.log
          if ($output -contains "README_CHANGED=true") {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Create branch and commit README
        id: commit_branch
        if: steps.readme_ai.outputs.changed == 'true'
        run: |
          $branchName = "ai-auto/$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          "branch_name=$branchName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git diff --quiet -- README.md
          if ($LASTEXITCODE -eq 0) {
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          git checkout -b $branchName
          git add README.md
          git commit -m "chore(ai): auto update README after validation"
          git push origin $branchName

          "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Prepare README Pull Request summary prompt
        if: steps.commit_branch.outputs.has_changes == 'true'
        run: |
          git fetch origin main

          $changedFiles = git diff --name-status origin/main...HEAD | Out-String
          $commitSummary = git log --oneline --no-merges origin/main..HEAD | Out-String
          $diffStat = git diff --stat origin/main...HEAD | Out-String
          $diff = git diff --unified=2 --no-ext-diff origin/main...HEAD | Out-String

          if ($diff.Length -gt 50000) {
            $diff = $diff.Substring(0, 50000) + "`n[Diff truncated for model context]"
          }

          $prompt = @"
          Write polished GitHub pull request metadata from the provided README update.
          Return only JSON with this exact shape:
          {"title":"...","body":"..."}

          Requirements:
          - Title must use conventional commit style and be 80 characters or fewer.
          - Body must be Markdown with these sections: Summary, Changes, Review Notes.
          - Mention that README.md was updated by automation.
          - Do not invent changes that are not supported by the commits or diff.
          - Keep the body concise and reviewer-friendly.
          - Return raw JSON only. Do not wrap it in Markdown code fences.

          Changed files:
          $changedFiles

          Commits:
          $commitSummary

          Diff stat:
          $diffStat

          Diff excerpt:
          $diff
          "@

          $prompt | Out-File -FilePath readme-pr-summary-prompt.md -Encoding utf8

      - name: Install GitHub Models CLI extension for README Pull Request summary
        if: steps.commit_branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install https://github.com/github/gh-models

      - name: Generate README Pull Request summary
        if: steps.commit_branch.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_SUMMARY_MODEL: openai/gpt-4.1
        run: |
          try {
            $prompt = Get-Content readme-pr-summary-prompt.md -Raw
            $modelOutput = "" | gh models run $env:PR_SUMMARY_MODEL $prompt
            $modelOutput | Out-File -FilePath readme-pr-summary-raw.txt -Encoding utf8
            Write-Host "AI README PR metadata response length: $($modelOutput.Length)"

            $jsonText = [regex]::Match($modelOutput, "(?s)\{.*\}").Value
            $metadata = $jsonText | ConvertFrom-Json -ErrorAction Stop

            $title = [string]$metadata.title
            $body = [string]$metadata.body

            if ([string]::IsNullOrWhiteSpace($title) -or [string]::IsNullOrWhiteSpace($body)) {
              throw "Model response did not include a usable title and body."
            }

            $title = $title -replace "(`r`n|`n|`r)", " "
            $title | Out-File -FilePath readme-pr-title.txt -Encoding utf8 -NoNewline
            $body | Out-File -FilePath readme-pr-body.md -Encoding utf8
            Write-Host "Saved AI-generated README PR title and body."
          } catch {
            Write-Warning "Could not parse AI-generated README PR metadata: $_"
          }

      - name: Create README Pull Request
        if: steps.commit_branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $title = "chore(ai): auto update README after validation"
          $body = "AI updated README.md for review."

          if (Test-Path readme-pr-title.txt) {
            $generatedTitle = (Get-Content readme-pr-title.txt -Raw).Trim()
            if (-not [string]::IsNullOrWhiteSpace($generatedTitle)) {
              $title = $generatedTitle
              Write-Host "Using AI-generated README PR title."
            }
          }

          if (Test-Path readme-pr-body.md) {
            $generatedBody = (Get-Content readme-pr-body.md -Raw).Trim()
            if (-not [string]::IsNullOrWhiteSpace($generatedBody)) {
              $body = $generatedBody
              Write-Host "Using AI-generated README PR body."
            }
          }

          if (-not (Test-Path readme-pr-body.md)) {
            Write-Warning "AI-generated README PR body was not found; using fallback PR body."
          }

          $body | Out-File -FilePath readme-pr-create-body.md -Encoding utf8

          $branchName = "${{ steps.commit_branch.outputs.branch_name }}"
          $existingPr = gh pr list `
            --base main `
            --head $branchName `
            --state open `
            --json number `
            --jq ".[0].number"

          if ($existingPr) {
            Write-Host "Pull request #$existingPr already exists for '$branchName'. Updating title and body."
            gh pr edit $existingPr `
              --title $title `
              --body-file readme-pr-create-body.md

            if ($LASTEXITCODE -ne 0) {
              Write-Warning "GitHub Actions could not update pull request #$existingPr."
            }
            exit 0
          }

          gh pr create `
            --title $title `
            --body-file readme-pr-create-body.md `
            --base main `
            --head $branchName

          if ($LASTEXITCODE -ne 0) {
            Write-Warning "GitHub Actions could not create the pull request automatically."
            Write-Host "Create it manually: https://github.com/${{ github.repository }}/compare/main...$branchName?expand=1"
            exit 0
          }
