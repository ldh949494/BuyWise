name: Entropy Cleanup Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: read

concurrency:
  group: entropy-cleanup-agent
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      models: read
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install GitHub Models CLI extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install https://github.com/github/gh-models

      - name: Run entropy cleanup agent
        env:
          GH_TOKEN: ${{ github.token }}
          ENTROPY_CLEANUP_MODEL: openai/gpt-4.1
        run: python -m scripts.entropy_cleanup_agent

      - name: Stop when no cleanup was applied
        id: changes
        run: |
          $changes = git status --short
          $changes | Out-File -FilePath entropy-cleanup-status.txt -Encoding utf8
          if ([string]::IsNullOrWhiteSpace($changes)) {
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Validate cleanup
        if: steps.changes.outputs.has_changes == 'true'
        run: ./scripts/auto_validate.ps1 -SkipDependencyInstall -SkipAndroidBuild

      - name: Enforce diff size limit
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          $diff = git diff --numstat
          $changedLines = 0
          foreach ($line in $diff) {
            $parts = $line -split "`t"
            if ($parts.Length -ge 2) {
              $add = if ($parts[0] -match "^\d+$") { [int]$parts[0] } else { 0 }
              $del = if ($parts[1] -match "^\d+$") { [int]$parts[1] } else { 0 }
              $changedLines += $add + $del
            }
          }
          "Changed lines: $changedLines"
          if ($changedLines -gt 500) {
            throw "Entropy cleanup diff is too large. Limit is 500 changed lines."
          }

      - name: Create cleanup branch and commit
        if: steps.changes.outputs.has_changes == 'true'
        id: commit
        run: |
          $branchName = "chore/entropy-gc-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          "branch_name=$branchName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b $branchName
          git add app tests docs scripts AGENTS.md README.md
          git commit -m "chore: clean up entropy debt"
          git push origin $branchName

      - name: Create cleanup pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create entropy-gc --color 0E8A16 --description "Automated entropy cleanup" 2>$null
          gh label create agent-generated --color 5319E7 --description "Generated by an agent" 2>$null
          gh label create needs-review --color FBCA04 --description "Needs human review" 2>$null

          $branchName = "${{ steps.commit.outputs.branch_name }}"
          $body = @"
          ## Summary
          Automated entropy cleanup generated by the background cleanup agent.

          ## Safety
          - Handles one selected cleanup target.
          - Does not refresh docs/entropy/baseline.json.
          - Runs repository validation before creating this PR.
          - Enforces a 500 changed-line limit.

          ## Validation
          - ./scripts/auto_validate.ps1 -SkipDependencyInstall -SkipAndroidBuild

          ## Review Checklist
          - [ ] Behavior is unchanged.
          - [ ] Cleanup scope is small and understandable.
          - [ ] Tests and custom linters passed.
          "@
          $body | Out-File -FilePath entropy-cleanup-pr.md -Encoding utf8
          gh pr create `
            --title "chore: clean up entropy debt" `
            --body-file entropy-cleanup-pr.md `
            --base main `
            --head $branchName `
            --label entropy-gc `
            --label agent-generated `
            --label needs-review

      - name: Upload cleanup report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entropy-cleanup-report
          path: |
            artifacts/entropy-cleanup/report.md
            entropy-cleanup-status.txt
